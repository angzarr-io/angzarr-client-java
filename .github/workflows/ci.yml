name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [protos-updated]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build
        run: just -f justfile.container build

      - name: Test
        run: just -f justfile.container test

      - name: Format check
        run: just -f justfile.container fmt
        continue-on-error: true  # TODO: fix existing format violations then remove

  mutation-test:
    name: Mutation Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Mutation test
        run: just -f justfile.container mutation-test
