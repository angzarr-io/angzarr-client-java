name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release to GitHub Packages
    runs-on: ubuntu-latest
    container: ghcr.io/angzarr-io/angzarr-java:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify version matches tag
        run: |
          BUILD_VERSION=$(grep '^version = ' build.gradle.kts | head -1 | sed 's/.*version = "\(.*\)".*/\1/')
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$BUILD_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: build.gradle.kts version ($BUILD_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build
        run: just build

      - name: Test
        run: just test

      # Uncomment when ready to publish
